services:
  hackforge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://lenses-reporting-somewhere-thought.trycloudflare.com
    user: root
    restart: unless-stopped
    networks:
      - hackforge-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  hackforge-network:
    driver: bridge
